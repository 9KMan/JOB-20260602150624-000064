version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: premium-directory-api
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres123
      - DB_DATABASE=premium_directory
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - JWT_REFRESH_SECRET=your-refresh-secret-key-change-in-production
      - YOTI_APP_ID=
      - YOTI_CLIENT_SDK_ID=
      - YOTI_PRIVATE_KEY=
      - PIPEDRIVE_API_TOKEN=
      - CCBILL_ACC_NUM=
      - CCBILL_SUBACC_NUM=
      - CCBILL_SECURITY_KEY=
      - API_KEY=local-api-key-for-development
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis
    networks:
      - premium-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: premium-directory-postgres
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres123
      - POSTGRES_DB=premium_directory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - premium-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: premium-directory-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - premium-network
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:

networks:
  premium-network:
    driver: bridge