name: Security Scan

on:
  schedule:
    - cron: '0 2 * * *'  # Daily at 2 AM UTC
  workflow_dispatch:
    inputs:
      scan_type:
        description: 'Type of scan to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - sast
          - dependency
          - container
          - secrets

permissions:
  contents: read
  security-events: write
  actions: read
  deployments: read

env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
  CODEQL_VERSION: '2.17.0'

jobs:
  snyk-scan:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'dependency'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk monitor
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk test
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: '--severity-threshold=high --fail-on=all'

      - name: Run Snyk Python scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk JSON report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-json-report
          path: |
            snyk-json-report.json
            snyk-results.json
          retention-days: 30

  codeql-sast:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    needs: snyk-scan
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'sast'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript, typescript, python
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript,typescript,python"
          upload: always

      - name: Upload CodeQL results
        uses: actions/upload-artifact@v4
        with:
          name: codeql-results
          path: |
            results/*.sarif
          retention-days: 30

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    needs: snyk-scan
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'dependency'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm-audit
        run: npm install -g npm-audit

      - name: Run npm audit
        run: |
          npm audit --audit-level=high
        continue-on-error: true

      - name: Run pip audit
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip audit
        run: |
          pip-audit --require-hashes --output-format=json > pip-audit-results.json
        continue-on-error: true
        working-directory: ./backend

      - name: Upload pip audit results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-results
          path: pip-audit-results.json
          retention-days: 30

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: snyk-scan
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'container'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Pull latest backend image
        run: |
          docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/premium-service-directory:latest

      - name: Run Trivy container scan
        uses: aqua/setup-trivy-action@v2
        with:
          version: v0.50.0

      - name: Scan container image with Trivy
        run: |
          trivy image --format json --output trivy-results.json \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/premium-service-directory:latest

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-results
          path: trivy-results.json
          retention-days: 30

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    needs: codeql-sast
    if: github.event_name == 'schedule' || github.event.inputs.scan_type == 'all' || github.event.inputs.scan_type == 'secrets'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run GitLeaks
        uses: goreleaser/gitleaks-action@v2
        with:
          args: '--verbose --log-level=info'
        env:
          GITLEAKS_ENABLED: true

      - name: Scan for secrets using TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD

      - name: Upload secret scan results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: secret-scan-results
          path: |
            gitleaks-results.json
            trufflehog-results.txt
          retention-days: 30
        continue-on-error: true

  security-report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [snyk-scan, codeql-sast, dependency-audit, container-scan, secret-scan]
    if: always()

    steps:
      - name: Download all scan results
        uses: actions/download-artifact@v4
        with:
          path: ./scan-results

      - name: Generate summary
        shell: bash
        run: |
          echo "# Security Scan Summary" > security-report.md
          echo "" >> security-report.md
          echo "**Scan Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> security-report.md
          echo "**Repository:** ${{ github.repository }}" >> security-report.md
          echo "**Commit:** ${{ github.sha }}" >> security-report.md
          echo "" >> security-report.md

          echo "## Results Overview" >> security-report.md
          echo "" >> security-report.md
          echo "| Scan Type | Status |" >> security-report.md
          echo "|-----------|--------|" >> security-report.md
          echo "| Snyk | ${{ needs.snyk-scan.result }} |" >> security-report.md
          echo "| CodeQL SAST | ${{ needs.codeql-sast.result }} |" >> security-report.md
          echo "| Dependency Audit | ${{ needs.dependency-audit.result }} |" >> security-report.md
          echo "| Container Scan | ${{ needs.container-scan.result }} |" >> security-report.md
          echo "| Secret Scan | ${{ needs.secret-scan.result }} |" >> security-report.md

      - name: Upload security report
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: security-report.md
          retention-days: 90

      - name: Send Slack notification on critical findings
        if: needs.snyk-scan.result == 'success' && needs.codeql-sast.result == 'success'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{
              "text": "🔒 Daily Security Scan Completed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Daily Security Scan Report*\n• Repository: `${{ github.repository }}`\n• Date: '$(date -u +"%Y-%m-%d %H:%M UTC")'\n• All scans passed successfully ✅"
                  }
                }
              ]
            }'

      - name: Send Slack notification on scan failures
        if: needs.snyk-scan.result != 'success' || needs.codeql-sast.result != 'success'
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{
              "text": "⚠️ Security Scan Issues Detected",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Security Scan Report - Issues Found*\n• Repository: `${{ github.repository }}`\n• Date: '$(date -u +"%Y-%m-%d %H:%M UTC")'\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Scan Results>"
                  }
                }
              ]
            }'