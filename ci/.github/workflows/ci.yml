name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node20
            setup-file: .nvmrc
          - runtime: python311
            setup-file: .python-version

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: matrix.runtime == 'node20'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python 3.11
        if: matrix.runtime == 'python311'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Get npm cache directory
        if: matrix.runtime == 'node20'
        id: npm-cache
        shell: bash
        run: echo "dir=$(npm config get cache)" >> $GITHUB_OUTPUT

      - name: Cache npm dependencies
        if: matrix.runtime == 'node20'
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Cache pip dependencies
        if: matrix.runtime == 'python311'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        if: matrix.runtime == 'node20'
        run: npm ci

      - name: Install Python dependencies
        if: matrix.runtime == 'python311'
        run: pip install -r requirements.txt

      - name: Run ESLint
        if: matrix.runtime == 'node20'
        run: npm run lint

      - name: Run Python linting
        if: matrix.runtime == 'python311'
        run: |
          pip install flake8 black isort
          flake8 . --max-line-length=100 --exclude=node_modules,.git,__pycache__,build,dist
          black --check .
          isort --check-only .

  type-check:
    name: Type Check
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node20
          - runtime: python311

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: matrix.runtime == 'node20'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python 3.11
        if: matrix.runtime == 'python311'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: matrix.runtime == 'node20'
        run: npm ci

      - name: Install Python dependencies
        if: matrix.runtime == 'python311'
        run: pip install -r requirements.txt

      - name: Run TypeScript type check
        if: matrix.runtime == 'node20'
        run: npm run type-check || npx tsc --noEmit

      - name: Run Python type check
        if: matrix.runtime == 'python311'
        run: pip install mypy && mypy . --ignore-missing-imports

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node20
          - runtime: python311

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: matrix.runtime == 'node20'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python 3.11
        if: matrix.runtime == 'python311'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: matrix.runtime == 'node20'
        run: npm ci

      - name: Install Python dependencies
        if: matrix.runtime == 'python311'
        run: pip install -r requirements.txt

      - name: Run Jest tests
        if: matrix.runtime == 'node20'
        run: npm test -- --coverage --ci

      - name: Run pytest
        if: matrix.runtime == 'python311'
        run: |
          pip install pytest pytest-cov coverage
          pytest --cov --cov-report=xml --cov-report=html

      - name: Upload coverage to Codecov
        if: matrix.runtime == 'node20'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Upload coverage to Codecov
        if: matrix.runtime == 'python311'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, type-check, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: node20
          - runtime: python311

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        if: matrix.runtime == 'node20'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Python 3.11
        if: matrix.runtime == 'python311'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: matrix.runtime == 'node20'
        run: npm ci

      - name: Install Python dependencies
        if: matrix.runtime == 'python311'
        run: pip install -r requirements.txt

      - name: Build Node.js application
        if: matrix.runtime == 'node20'
        run: npm run build

      - name: Build Python application
        if: matrix.runtime == 'python311'
        run: |
          pip install build
          python -m build

      - name: Upload build artifacts
        if: matrix.runtime == 'node20'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 7

      - name: Upload build artifacts
        if: matrix.runtime == 'python311'
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: dist/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Run Snyk Python security scan
        uses: snyk/actions/python@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk reports
        uses: actions/upload-artifact@v4
        with:
          name: snyk-reports
          path: |
            snyk-report.html
            snyk-results.json
          retention-days: 30
        continue-on-error: true