name: Deploy Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'scripts/terraform.sh'

env:
  TF_VERSION: '1.6.0'
  TF_WORKING_DIR: 'infra'

jobs:
  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform init
        id: init
        run: terraform init -backend=true
        env:
          TF_BACKEND_TYPE: s3
          TF_BACKEND_CONFIG: |
            bucket = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
            key    = "infrastructure/terraform.tfstate"
            region = "${{ env.AWS_REGION }}"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform format check
        run: terraform fmt -check -recursive
        continue-on-error: true

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: terraform-validate
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        id: init
        run: terraform init -backend=true
        env:
          TF_BACKEND_TYPE: s3
          TF_BACKEND_CONFIG: |
            bucket = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
            key    = "infrastructure/terraform.tfstate"
            region = "${{ env.AWS_REGION }}"

      - name: Terraform plan
        id: plan
        run: terraform plan -out=tfplan -var-file=prod.tfvars
        env:
          TF_VAR_environment: prod
          TF_VAR_aws_region: ${{ env.AWS_REGION }}
        continue-on-error: true

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

  terraform-apply-dev:
    name: Terraform Apply (Development)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: development
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -backend=true
        env:
          TF_BACKEND_TYPE: s3
          TF_BACKEND_CONFIG: |
            bucket = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
            key    = "infrastructure/terraform.tfstate"
            region = "${{ env.AWS_REGION }}"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_environment: dev
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

      - name: Send Slack notification on success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"✅ Infrastructure deployment to DEV succeeded","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"*Infrastructure Deployment - DEV*\n• Status: Success\n• Commit: `${{ github.sha }}`\n• Triggered by: `${{ github.actor }}`"}}]}'

      - name: Send Slack notification on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"❌ Infrastructure deployment to DEV failed","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"*Infrastructure Deployment - DEV*\n• Status: FAILED\n• Commit: `${{ github.sha }}`\n• Triggered by: `${{ github.actor }}`\n• Logs: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"}}]}'

  terraform-apply-prod:
    name: Terraform Apply (Production)
    runs-on: ubuntu-latest
    needs: terraform-plan
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
            terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform init
        run: terraform init -backend=true
        env:
          TF_BACKEND_TYPE: s3
          TF_BACKEND_CONFIG: |
            bucket = "${{ secrets.TERRAFORM_STATE_BUCKET }}"
            key    = "infrastructure/terraform.tfstate"
            region = "${{ env.AWS_REGION }}"

      - name: Terraform apply
        run: terraform apply -auto-approve tfplan
        env:
          TF_VAR_environment: prod
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

      - name: Send Slack notification on success
        if: success()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"✅ Infrastructure deployment to PROD succeeded","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"*Infrastructure Deployment - PROD*\n• Status: Success\n• Commit: `${{ github.sha }}`\n• Triggered by: `${{ github.actor }}`"}}]}'

      - name: Send Slack notification on failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
            -H 'Content-type: application/json' \
            --data '{"text":"❌ Infrastructure deployment to PROD failed","blocks":[{"type":"section","text":{"type":"mrkdwn","text":"*Infrastructure Deployment - PROD*\n• Status: FAILED\n• Commit: `${{ github.sha }}`\n• Triggered by: `${{ github.actor }}`\n• Logs: <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"}}]}'