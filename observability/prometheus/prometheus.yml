# Prometheus Configuration for Premium Service Directory Platform
# Version: 1.0.0

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'premium-service-directory'
    environment: 'production'
    provider: 'aws'
    region: 'us-east-1'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Remote write configuration for long-term metric storage
remote_write:
  - url: https://metrics-endpoint.example.com/api/v1/write
    sigv4:
      region: us-east-1
    remote_timeout: 30s
    queue_config:
      capacity: 10000
      max_shards: 5
      min_shards: 2
      max_samples_per_send: 2000
      batch_send_deadline: 30s
    metadata_config:
      send: true
      send_interval: 1m
    write_relabel_configs:
      - source_labels: [__name__]
        regex: '(kubernetes_|node_|cadvisor_|container_).*'
        action: keep
      - target_label: environment
        replacement: production
      - target_label: cluster
        replacement: premium-service-directory

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):9090'
        replacement: '${1}'

  # Node Exporter for infrastructure metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets:
          - node-exporter:9100
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):9100'
        replacement: '${1}'
      - source_labels: [__address__]
        target_label: __param_target
        regex: '(.+)'
        replacement: '${1}'
      - source_labels: [__param_target]
        target_label: instance
      - action: labelmap
        regex: __meta_ec2_tag_(.+)

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets:
          - cadvisor:8080
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        regex: '(.+):8080'
        replacement: '${1}'
      - action: labelmap
        regex: __meta_container_label_(.+)
        replacement: ${1}
      - source_labels: [__meta_kubernetes_pod_name]
        target_label: kubernetes_pod_name
      - source_labels: [__meta_kubernetes_namespace]
        target_label: kubernetes_namespace

  # Backend services (NestJS API)
  - job_name: 'backend-services'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - production
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)
      - source_labels: [__meta_kubernetes_namespace]
        action: replace
        target_label: kubernetes_namespace
      - source_labels: [__meta_kubernetes_pod_name]
        action: replace
        target_label: kubernetes_pod_name
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: '(http_|grpc_).*'
        action: keep

  # Frontend (Next.js)
  - job_name: 'frontend'
    kubernetes_sd_configs:
      - role: pod
        namespaces:
          names:
            - production
    relabel_configs:
      - source_labels: [__meta_kubernetes_pod_label_app]
        action: keep
        regex: frontend
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
        action: keep
        regex: true
      - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
        action: replace
        target_label: __metrics_path__
        regex: (.+)
        replacement: /metrics
      - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
        action: replace
        regex: ([^:]+)(?::\d+)?;(\d+)
        replacement: $1:$2
        target_label: __address__
      - action: labelmap
        regex: __meta_kubernetes_pod_label_(.+)

  # ECS/Fargate metrics
  - job_name: 'ecs-fargate'
    amazon_sd_configs:
      - region: us-east-1
        role_arn: arn:aws:iam::123456789012:role/prometheus-ecs-scrape-role
    relabel_configs:
      - source_labels: [__meta_ecs_cluster_name]
        target_label: ecs_cluster
      - source_labels: [__meta_ecs_service_name]
        target_label: ecs_service
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance_name
      - action: keep
        source_labels: [__meta_ecs_task_definition_family]
        regex: '(backend|frontend|worker)-.*'

  # RDS metrics
  - job_name: 'rds'
    amazon_sd_configs:
      - region: us-east-1
        role_arn: arn:aws:iam::123456789012:role/prometheus-rds-scrape-role
    relabel_configs:
      - source_labels: [__meta_rds_instance_identifier]
        target_label: rds_instance
      - source_labels: [__meta_rds_engine]
        target_label: rds_engine
      - action: keep
        source_labels: [__meta_rds_tag_Name]
        regex: '.*'

  # Application-specific metrics endpoints
  - job_name: 'api-metrics'
    metrics_path: '/metrics'
    static_configs:
      - targets:
          - backend-api:3000
          - backend-api:3001
          - backend-worker:3000
    relabel_configs:
      - source_labels: [__address__]
        target_label: service
        regex: 'backend-(api|worker):.*'
        replacement: 'backend-${1}'
      - source_labels: [__address__]
        target_label: instance
        regex: '.*:(\d+)'
        replacement: '${1}'

# Recording rules for common aggregations
rule_files:
  - 'alerts.yml'
  - 'recording_rules.yml'

# Load rules once and periodically evaluate them
evaluation_interval: 15s
